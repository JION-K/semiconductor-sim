openapi: 3.0.3
info:
  title: Semi Fab Simulation Facade API
  version: 1.0.0
servers:
  - url: http://localhost:8080
paths:
  /:
    get:
      summary: Service health
      responses:
        '200':
          description: OK
  /api/status:
    get:
      summary: Get simulation status
      responses:
        '200':
          description: Status payload
  /api/step:
    post:
      summary: Progress one step
      responses:
        '200':
          description: Status payload
  /api/control/reset:
    post:
      summary: Reset simulation
      responses:
        '200':
          description: Status payload
  /api/control/pause:
    post:
      summary: Pause simulation
      responses:
        '200':
          description: Status payload
  /api/control/resume:
    post:
      summary: Resume simulation
      responses:
        '200':
          description: Status payload
  /api/dispatch:
    post:
      summary: Manual dispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_idx]
              properties:
                action_idx:
                  type: integer
      responses:
        '200':
          description: Status payload
  /api/layout:
    get:
      summary: Get machine layout
      responses:
        '200':
          description: Layout map
  /api/debug/ui-event:
    post:
      summary: Debug UI event ingest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '200':
          description: OK
  /api/debug/file-write-check:
    get:
      summary: Check backend log file writeability
      responses:
        '200':
          description: OK
